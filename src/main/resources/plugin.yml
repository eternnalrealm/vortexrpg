name: ${name}
version: ${version}
main: io.vortexcore.VortexCorePlugin
description: ${description}
api-version: "1.21"
folia-supported: true
load: POSTWORLD
website: http://eternalrealm.uk
softdepend:
  - Citizens
  - WorldGuard
  - PlaceholderAPI
  - Vault
authors:
  - "EternalRealm\u2122"
commands:
  expeditions:
    description: Expedition board, contracts, breach finales and party management
    usage: /expeditions [open|status|leaderboard|breach|rewards|quartermaster|party|abandon]
  fracture:
    description: Fracture rift tracking, gateway network and realm administration
    usage: /fracture [status|list|profiles|map|gateway|seed|suppress|breach|tp]
  class:
    description: Class selection, inspection and ascension paths
    usage: /class [open|info|specs|choose|ascend|admin]
  skills:
    description: Skill atlas, spell management and point allocation
    usage: /skills [open|points|unlock|spells|equip]
  stats:
    description: Character stats and progression overview
    usage: /stats [open|text|admin]
  adventure:
    description: Adventure board objectives and seasonal reward tracks
    usage: /adventure [open|status|season]
  professions:
    description: Profession ledger, crafting stations and gathering
    usage: /professions [open|stats|station]
  cast:
    description: Cast your equipped or selected spell
    usage: /cast [spell]
  spell:
    description: Spellbook overview, equip, cast and forge access
    usage: /spell [open|menu|info|list|cast [spell]|equip <spell>|forge]
  quest:
    description: Quest board, quest tracking and quest management
    usage: /quest [open|list|start|abandon|progress|log|info|reload]
  talent:
    description: Talent tree, passive upgrades and talent point management
    usage: /talent [open|points|info|reset|admin]
  vortex:
    description: VortexRPG admin toolkit — forges, hot-reload, diagnostics and integrations
    usage: /vortex [subcommand]
  vboss:
    description: Custom boss encounters — summon, browse and manage world bosses
    usage: /vboss [open|list|spawn|summon|clear|info|edit|reload]
  vdungeon:
    description: Dungeon instances — browse, enter, and manage instanced dungeons
    usage: /vdungeon [open|list|enter|leave|info|reload]
  auction:
    description: Auction house — buy, sell, search and manage player listings
    usage: /auction [browse|sell|search|my]
  party:
    description: Party management — roles, chat, ready checks, summon and GUI
    usage: /party [create|invite|accept|decline|kick|promote|demote|transfer|leave|info|gui|chat|toggle|summon|ready|rename|disband|list]
  pc:
    description: Send a message to your party
    usage: /pc <message>
  vrp:
    description: VortexRPG unified command hub — all features under one root
    usage: /vrp [class|skills|stats|cast|quest|talent|professions|adventure|fracture|expeditions|boss|dungeon|auction|party|admin]
    aliases: [vortexrpg, vrpg]
permissions:
