    speed-multiplier: 0.8
    min-level: 25
    spawn-cooldown-seconds: 600
    despawn-after-seconds: 300
    phases:
      - threshold: 1.0
        abilities: [fireball_barrage]
      - threshold: 0.6
        abilities: [fireball_barrage, flame_aura]
