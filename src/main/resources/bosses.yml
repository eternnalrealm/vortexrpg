bosses:
  infernal_warden:
    display-name: "<gradient:#FF4500:#FF8C00>Infernal Warden</gradient>"
    entity-type: WITHER_SKELETON
    max-health: 800.0
    damage-multiplier: 2.5
    speed-multiplier: 1.3
    min-level: 15
    spawn-cooldown-seconds: 300
    despawn-after-seconds: 180
    phases:
      - threshold: 1.0
        abilities: [fireball_barrage]
      - threshold: 0.5
        abilities: [fireball_barrage, flame_aura]
        speed-multiplier: 1.6
      - threshold: 0.2
        abilities: [fireball_barrage, flame_aura, enrage]
        damage-multiplier: 3.5
    loot-profiles:
      - item-id: infernal_greatsword
        base-value: 12.0
        scale-per-level: 0.8
        spread: 2.5
    summon-item: BLAZE_POWDER
    arena-radius: 30

  frost_colossus:
    display-name: "<gradient:#00BFFF:#1E90FF>Frost Colossus</gradient>"
